name: CI/CD Pipeline
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build Docker images
        run: docker compose build

      - name: Start services
        run: docker compose up -d

      - name: Wait for services to be healthy
        run: |
          sleep 10
          docker compose ps
          docker compose exec -T app wget -qO- http://localhost:3000/health || echo "App not healthy yet..."
          sleep 20

      - name: Run Unit Tests
        run: docker compose exec -T app npm run test:unit

      - name: Run Integration Tests
        run: docker compose exec -T app npm run test:integration

      - name: Log in to Docker Hub
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Tag and Push Docker image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          docker tag my-ratelimit-service-app:latest ${{ secrets.DOCKER_USERNAME }}/my-ratelimit-service:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/my-ratelimit-service:latest

      - name: Stop services
        run: docker compose down
